name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Get version from package.json
        id: pkg
        shell: bash
        run: echo version=$(node -p "require('./package.json').version") >> $GITHUB_OUTPUT
      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          echo "VITE_SUPABASE_PROJECT_ID=${{ secrets.VITE_SUPABASE_PROJECT_ID }}" >> .env

      - name: Build Electron Windows EXE
        run: |
          npm run build:electron
          npm run integrity
          npx electron-builder --win --config electron-builder.yml --publish never

      - name: Upload Windows release files
        uses: actions/upload-artifact@v4
        with:
          name: School-Cashbox-Windows-Release
          path: release/*
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: "v${{ steps.pkg.outputs.version }}"
          body: "تحديث تلقائي - الإصدار ${{ steps.pkg.outputs.version }}"
          draft: false
          prerelease: false
          files: |
            release/*.exe
            release/*.yml
            release/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
